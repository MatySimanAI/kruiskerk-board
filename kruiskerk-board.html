<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Kruiskerk · Departures</title>
<style>
  :root {
    --black: #000;
    --white: #fff;
    --gray:  #888;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 800px;
    height: 480px;
    background: var(--white);
    color: var(--black);
    font-family: -apple-system, "Helvetica Neue", "Segoe UI", Helvetica, Arial, sans-serif;
    font-weight: 900;
    font-feature-settings: "tnum";
    -webkit-font-smoothing: none;
    overflow: hidden;
  }
  body {
    padding: 18px 28px 14px;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding-bottom: 10px;
    border-bottom: 3px solid var(--black);
  }
  .stop-name { font-size: 38px; letter-spacing: 1px; line-height: 1; }
  .time-block { text-align: right; }
  .now {
    font-size: 38px;
    letter-spacing: 1px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .updated   { font-size: 16px; color: var(--gray); font-weight: 700; margin-top: 4px; }
  .updated.stale { color: var(--black); }

  section { padding-top: 14px; }
  .section-label {
    font-size: 22px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }
  .arrow { font-size: 24px; line-height: 1; }
  .divider {
    border-top: 2px solid var(--black);
    margin-bottom: 6px;
  }

  .row {
    display: grid;
    grid-template-columns: 96px 1fr 150px 150px;
    align-items: center;
    column-gap: 18px;
    padding: 6px 0;
  }
  .badge {
    display: inline-flex;
    justify-content: center;
    align-items: center;
    width: 88px;
    height: 52px;
    background: var(--black);
    color: var(--white);
    border-radius: 8px;
    font-size: 32px;
    letter-spacing: 1px;
  }
  .destination {
    font-size: 24px;
    font-weight: 800;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .time {
    font-size: 38px;
    font-weight: 900;
    text-align: right;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .time.empty { color: var(--gray); }
  .time.next  { color: #d40000; }
</style>
</head>
<body>

<header>
  <div class="stop-name">KRUISKERK</div>
  <div class="time-block">
    <div class="now" id="now">--:--</div>
    <div class="updated" id="updated">loading…</div>
  </div>
</header>

<main id="main"></main>

<script>
  // ---- config ----
  const STOP_ID    = "NL:S:57243210";
  const FEED_URL   = `https://drgl.nl/stop/${STOP_ID}/departurespanel`;
  const PLACEHOLDER = "—:—";
  const WALK_TIME_MIN = 1;  // shift displayed times earlier so "now" = leave-the-house
  const LATE_GRACE_MIN = 1; // keep buses visible this many minutes past displayed time
  const LINES = new Set(["178", "357"]);
  const NORTHBOUND_HINT = "Amsterdam";
  const SUFFIXES_TO_STRIP = new Set(["Amsterdam", "Amstelveen", "Busst.", "Busstation"]);

  // drgl.nl has no CORS headers, so route through a public CORS proxy.
  // Try them in order; first success wins.
  const PROXIES = [
    (u) => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(u)}`,
    (u) => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  ];

  const SECTIONS = [
    { direction: "TO SCHOOL",    arrow: "↓", keys: ["178_south", "357_south"] },
    { direction: "TO AMSTERDAM", arrow: "↑", keys: ["178_north", "357_north"] },
  ];

  // Canonical destination per (line, direction) — pinned so the row label
  // doesn't flicker between e.g. "Aalsmeer" and "Kudelstaart" when the
  // next-departing 357 happens to be a short-run.
  const CANONICAL_DEST = {
    "178_north": "Station Zuid",
    "178_south": "Poortwachter",
    "357_north": "Elandsgracht",
    "357_south": "Aalsmeer",
  };

  // ---- DOM scaffolding ----
  const main = document.getElementById("main");
  const updatedEl = document.getElementById("updated");
  const nowEl = document.getElementById("now");

  function buildSkeleton() {
    main.innerHTML = "";
    for (const sec of SECTIONS) {
      const el = document.createElement("section");
      el.innerHTML = `
        <div class="section-label">
          <span class="arrow">${sec.arrow}</span>
          <span>${sec.direction}</span>
        </div>
        <div class="divider"></div>
      `;
      for (const key of sec.keys) {
        const line = key.split("_")[0];
        const row = document.createElement("div");
        row.className = "row";
        row.dataset.key = key;
        row.innerHTML = `
          <div class="badge">${line}</div>
          <div class="destination" data-field="dest"></div>
          <div class="time empty" data-field="t0">${PLACEHOLDER}</div>
          <div class="time empty" data-field="t1">${PLACEHOLDER}</div>
        `;
        el.appendChild(row);
      }
      main.appendChild(el);
    }
  }

  function minutesUntil(hhmm) {
    // Compare minute LABELS, not raw timestamps. A bus listed as HH:MM is
    // "happening now" (diff = 0) for the entire HH:MM:00–HH:MM:59 window;
    // it only becomes "past" once the wall clock rolls into the next minute.
    const [h, m] = hhmm.split(":").map(Number);
    const now = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes();
    let diff = (h * 60 + m) - nowMin;
    // Wrap past midnight: "00:05" shown at "23:55" is tomorrow.
    if (diff < -12 * 60) diff += 24 * 60;
    return diff;
  }

  function render(buckets) {
    for (const sec of SECTIONS) {
      // Per-section: collect cell+minutes pairs so we can mark the soonest,
      // and track the soonest-per-row so we can reorder rows.
      const candidates = [];
      const rowSoonest = Object.fromEntries(sec.keys.map((k) => [k, Infinity]));
      for (const key of sec.keys) {
        const row = main.querySelector(`.row[data-key="${key}"]`);
        const entries = buckets[key] || [];
        row.querySelector('[data-field="dest"]').textContent =
          CANONICAL_DEST[key] || "";
        for (const idx of [0, 1]) {
          const cell = row.querySelector(`[data-field="t${idx}"]`);
          cell.classList.remove("next");
          const e = entries[idx];
          if (e) {
            cell.textContent = e.time;
            cell.classList.remove("empty");
            const m = minutesUntil(e.time);
            if (m >= -LATE_GRACE_MIN) {
              candidates.push({ cell, m });
              if (m < rowSoonest[key]) rowSoonest[key] = m;
            }
          } else {
            cell.textContent = PLACEHOLDER;
            cell.classList.add("empty");
          }
        }
      }
      if (candidates.length) {
        candidates.sort((a, b) => a.m - b.m);
        candidates[0].cell.classList.add("next");
      }

      // Reorder rows in this section so the line whose next bus is soonest
      // sits on top. Empty rows (Infinity) sink to the bottom.
      const sortedKeys = [...sec.keys].sort(
        (a, b) => rowSoonest[a] - rowSoonest[b]
      );
      const sectionEl = main.querySelector(`.row[data-key="${sec.keys[0]}"]`).parentElement;
      for (const key of sortedKeys) {
        sectionEl.appendChild(sectionEl.querySelector(`.row[data-key="${key}"]`));
      }
    }
  }

  // ---- fetching + parsing drgl.nl ----
  function shortenDestination(dest) {
    const parts = dest.trim().split(/\s+/);
    while (parts.length && SUFFIXES_TO_STRIP.has(parts[parts.length - 1])) {
      parts.pop();
    }
    return parts.join(" ") || dest;
  }

  function parseDeparturePanel(html) {
    const doc = new DOMParser().parseFromString(html, "text/html");
    const items = doc.querySelectorAll(".list-group-item");
    const out = [];
    for (const it of items) {
      const timeEl = it.querySelector(".ott-departure-time");
      // drgl.nl uses HH:MM as scheduled time, with an optional " ±N" delay.
      // Real-time expected arrival is HH:MM + delay. A "VERTROKKEN" badge or
      // the "ott-tripstatus-passed" class means the bus has already left.
      const cls = timeEl?.className || "";
      if (cls.includes("ott-tripstatus-passed")) continue;
      const timeRaw = timeEl?.textContent ?? "";
      const timeMatch = timeRaw.match(/(\d{1,2}):(\d{2})(?:\s*([+-]\d+))?/);
      if (!timeMatch) continue;
      const scheduled = `${timeMatch[1].padStart(2, "0")}:${timeMatch[2]}`;
      const delay = timeMatch[3] ? parseInt(timeMatch[3], 10) : 0;
      const time = shiftTime(scheduled, delay);  // real-time expected arrival
      const line = it.querySelector(".ott-linecode")?.textContent.trim() || "";
      const dest = it.querySelector(".ott-destination")?.textContent.trim() || "";
      if (time && line) out.push({ time, line, dest });
    }
    return out;
  }

  function shiftTime(hhmm, deltaMin) {
    const [h, m] = hhmm.split(":").map(Number);
    let mins = (h * 60 + m + deltaMin + 24 * 60) % (24 * 60);
    return `${String(Math.floor(mins / 60)).padStart(2, "0")}:${String(mins % 60).padStart(2, "0")}`;
  }

  function bucketize(items) {
    const out = { "178_north": [], "178_south": [], "357_north": [], "357_south": [] };
    for (const d of items) {
      if (!LINES.has(d.line)) continue;
      const displayTime = shiftTime(d.time, -WALK_TIME_MIN);
      // Keep buses for LATE_GRACE_MIN minutes past their displayed time, in
      // case they're running late and still going to show up.
      if (minutesUntil(displayTime) < -LATE_GRACE_MIN) continue;
      const dir = d.dest.includes(NORTHBOUND_HINT) ? "north" : "south";
      const key = `${d.line}_${dir}`;
      if (out[key].length >= 2) continue;
      out[key].push({ time: displayTime, destination: shortenDestination(d.dest) });
    }
    return out;
  }

  async function fetchViaProxies(url) {
    let lastErr;
    for (const wrap of PROXIES) {
      try {
        const res = await fetch(wrap(url), { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        return await res.text();
      } catch (e) {
        lastErr = e;
      }
    }
    throw lastErr ?? new Error("all proxies failed");
  }

  function nowHHMM() {
    return new Date().toLocaleTimeString("en-GB", {
      hour: "2-digit", minute: "2-digit", timeZone: "Europe/Amsterdam",
    });
  }

  let lastGoodAt = null;

  async function refresh() {
    nowEl.textContent = nowHHMM();
    try {
      const html = await fetchViaProxies(FEED_URL);
      const items = parseDeparturePanel(html);
      render(bucketize(items));
      lastGoodAt = nowHHMM();
      updatedEl.textContent = `updated ${lastGoodAt}`;
      updatedEl.classList.remove("stale");
    } catch (err) {
      updatedEl.textContent = lastGoodAt
        ? `stale · last ${lastGoodAt}`
        : `offline`;
      updatedEl.classList.add("stale");
    }
  }

  // Schedule the next tick at the next wall-clock minute boundary (HH:MM:00).
  // Each tick recomputes the delay, so any drift self-corrects.
  function msUntilNextMinute() {
    const now = new Date();
    return 60_000 - (now.getSeconds() * 1000 + now.getMilliseconds());
  }
  async function tick() {
    try { await refresh(); }
    finally { setTimeout(tick, msUntilNextMinute()); }
  }

  buildSkeleton();
  tick();
</script>
</body>
</html>
