<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kruiskerk · Departures</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #000;
    --amber:     #ffb000;
    --amber-dim: #6b4a00;
    --bezel:     #000;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html {
    /* dvw/dvh track the *visible* viewport on mobile (URL bar excluded);
       100vh on iOS Safari reports the largest possible height which leaves
       the body offset/cut off when the URL bar is showing. vw/vh kept as a
       fallback for older browsers that ignore dvh. */
    width: 100vw;
    width: 100dvw;
    height: 100vh;
    height: 100dvh;
    background: var(--bezel);
    color: var(--amber);
    font-family: "VT323", "Courier New", monospace;
    -webkit-font-smoothing: none;
    overflow: hidden;
    position: relative;
  }
  body {
    /* The design is fixed at 800×480 (e-ink panel size). On smaller or
       portrait screens the JS fit() below applies a transform that scales,
       rotates if needed, and translates so the body sticks to the top of
       the visible viewport and is centered horizontally. */
    width: 800px;
    height: 480px;
    padding: 14px;
    background: var(--bezel);
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: top left;
  }

  .panel {
    background: var(--bg);
    width: 100%;
    height: 100%;
    border-radius: 6px;
    padding: 12px 22px 10px;
    display: flex;
    flex-direction: column;
  }

  header {
    display: grid;
    grid-template-columns: auto 1fr;
    align-items: end;
    column-gap: 28px;
    padding-bottom: 4px;
    border-bottom: 2px solid var(--amber);
  }
  .clock {
    font-size: 50px;
    line-height: 1;
    letter-spacing: 1px;
  }
  .col-headers {
    display: grid;
    grid-template-columns: 90px 1fr 170px;
    column-gap: 18px;
    font-size: 22px;
    line-height: 1;
    padding-bottom: 4px;
  }
  .col-headers .vertrek { text-align: right; }

  main { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }

  .section { padding-top: 4px; }
  .section-label {
    font-size: 22px;
    line-height: 1;
    padding-bottom: 4px;
  }
  .row {
    display: grid;
    grid-template-columns: 90px 1fr 170px;
    column-gap: 18px;
    align-items: baseline;
    font-size: 32px;
    line-height: 1.0;
    padding: 1px 0;
  }
  .row .bus      { letter-spacing: 1px; }
  .row .vertrek  { text-align: right; }
  .row.placeholder .bus,
  .row.placeholder .richting,
  .row.placeholder .vertrek { color: var(--amber-dim); }

  .footer {
    margin-top: auto;
    font-size: 16px;
    color: var(--amber-dim);
    text-align: right;
    line-height: 1;
  }
  .footer.stale { color: var(--amber); }
</style>
</head>
<body>

<div class="panel">
  <header>
    <div class="clock" id="clock">--:--</div>
    <div class="col-headers">
      <span>Bus</span>
      <span>Richting</span>
      <span class="vertrek">Vertrek (min)</span>
    </div>
  </header>

  <main>
    <section class="section" data-dir="south">
      <div class="section-label">&rarr; School</div>
      <div class="rows" id="rows-south"></div>
    </section>
    <section class="section" data-dir="north">
      <div class="section-label">&rarr; Amsterdam</div>
      <div class="rows" id="rows-north"></div>
    </section>
  </main>

  <div class="footer" id="footer">loading&hellip;</div>
</div>

<script>
  // ---- config ----
  const STOP_ID         = "NL:S:57243210";
  const FEED_URL        = `https://drgl.nl/stop/${STOP_ID}/departurespanel`;
  const WALK_TIME_MIN   = 1;   // shift earlier so countdown = leave-the-house
  const LATE_GRACE_MIN  = 1;   // keep buses visible this many min past displayed time
  const MAX_PER_DIR     = 4;   // rows shown per direction panel
  const LINES           = new Set(["178", "357"]);
  const NORTHBOUND_HINT = "Amsterdam";
  const SUFFIXES_TO_STRIP = new Set([
    "Amsterdam", "Amstelveen", "Busst.", "Busstation", "Bilderdammerweg",
  ]);

  // drgl.nl has no CORS headers; route through public CORS proxies.
  const PROXIES = [
    (u) => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(u)}`,
    (u) => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  ];

  const clockEl  = document.getElementById("clock");
  const footerEl = document.getElementById("footer");
  const rowsSouth = document.getElementById("rows-south");
  const rowsNorth = document.getElementById("rows-north");

  // ---- helpers ----
  function shiftTime(hhmm, deltaMin) {
    const [h, m] = hhmm.split(":").map(Number);
    const mins = (h * 60 + m + deltaMin + 24 * 60) % (24 * 60);
    return `${String(Math.floor(mins / 60)).padStart(2, "0")}:${String(mins % 60).padStart(2, "0")}`;
  }

  function minutesUntil(hhmm) {
    // Compare minute LABELS, so HH:MM stays "now" through HH:MM:59.
    const [h, m] = hhmm.split(":").map(Number);
    const now = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes();
    let diff = (h * 60 + m) - nowMin;
    if (diff < -12 * 60) diff += 24 * 60;
    return diff;
  }

  function shortenDestination(dest) {
    const parts = dest.trim().split(/\s+/);
    while (parts.length && SUFFIXES_TO_STRIP.has(parts[parts.length - 1])) {
      parts.pop();
    }
    return parts.join(" ") || dest;
  }

  function nowHHMM() {
    return new Date().toLocaleTimeString("en-GB", {
      hour: "2-digit", minute: "2-digit", timeZone: "Europe/Amsterdam",
    });
  }

  function formatVertrek(m) {
    if (m <= 0) return "Nu";
    return String(m);
  }

  // ---- fetching + parsing drgl.nl ----
  function parseDeparturePanel(html) {
    const doc = new DOMParser().parseFromString(html, "text/html");
    const items = doc.querySelectorAll(".list-group-item");
    const out = [];
    for (const it of items) {
      const timeEl = it.querySelector(".ott-departure-time");
      const cls = timeEl?.className || "";
      // VERTROKKEN / passed buses are gone; skip them.
      if (cls.includes("ott-tripstatus-passed")) continue;
      const timeRaw = timeEl?.textContent ?? "";
      // "HH:MM" with optional " ±N" delay → real-time expected arrival.
      const timeMatch = timeRaw.match(/(\d{1,2}):(\d{2})(?:\s*([+-]\d+))?/);
      if (!timeMatch) continue;
      const scheduled = `${timeMatch[1].padStart(2, "0")}:${timeMatch[2]}`;
      const delay = timeMatch[3] ? parseInt(timeMatch[3], 10) : 0;
      const time = shiftTime(scheduled, delay);
      const line = it.querySelector(".ott-linecode")?.textContent.trim() || "";
      const dest = it.querySelector(".ott-destination")?.textContent.trim() || "";
      if (time && line) out.push({ time, line, dest });
    }
    return out;
  }

  function bucketize(items) {
    const out = [];
    for (const d of items) {
      if (!LINES.has(d.line)) continue;
      const displayTime = shiftTime(d.time, -WALK_TIME_MIN);
      if (minutesUntil(displayTime) < -LATE_GRACE_MIN) continue;
      const dir = d.dest.includes(NORTHBOUND_HINT) ? "north" : "south";
      out.push({
        time: displayTime,
        line: d.line,
        dir,
        dest: shortenDestination(d.dest),
      });
    }
    return out;
  }

  async function fetchViaProxies(url) {
    let lastErr;
    for (const wrap of PROXIES) {
      try {
        const res = await fetch(wrap(url), { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        return await res.text();
      } catch (e) {
        lastErr = e;
      }
    }
    throw lastErr ?? new Error("all proxies failed");
  }

  // ---- rendering ----
  function renderDirection(rowsEl, items) {
    rowsEl.innerHTML = "";
    const sorted = items
      .map((e) => ({ ...e, m: minutesUntil(e.time) }))
      .sort((a, b) => a.m - b.m)
      .slice(0, MAX_PER_DIR);
    for (const e of sorted) {
      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML = `
        <span class="bus">${e.line}</span>
        <span class="richting">${e.dest}</span>
        <span class="vertrek">${formatVertrek(e.m)}</span>
      `;
      rowsEl.appendChild(row);
    }
    while (rowsEl.children.length < MAX_PER_DIR) {
      const row = document.createElement("div");
      row.className = "row placeholder";
      row.innerHTML = `<span class="bus">&mdash;</span><span class="richting">&mdash;</span><span class="vertrek">&mdash;</span>`;
      rowsEl.appendChild(row);
    }
  }

  function render(items) {
    renderDirection(rowsSouth, items.filter((e) => e.dir === "south"));
    renderDirection(rowsNorth, items.filter((e) => e.dir === "north"));
  }

  // ---- refresh loop ----
  let lastGoodAt = null;
  let lastItems  = null;

  async function refresh() {
    clockEl.textContent = nowHHMM();
    try {
      const html = await fetchViaProxies(FEED_URL);
      const parsed = parseDeparturePanel(html);
      lastItems = bucketize(parsed);
      render(lastItems);
      lastGoodAt = nowHHMM();
      footerEl.textContent = `bijgewerkt ${lastGoodAt}`;
      footerEl.classList.remove("stale");
    } catch (err) {
      // Re-render last data so the countdown keeps ticking even when offline.
      if (lastItems) render(lastItems);
      footerEl.textContent = lastGoodAt
        ? `verouderd · laatst ${lastGoodAt}`
        : `offline`;
      footerEl.classList.add("stale");
    }
  }

  // Top-of-minute scheduling, self-correcting against drift.
  function msUntilNextMinute() {
    const now = new Date();
    return 60_000 - (now.getSeconds() * 1000 + now.getMilliseconds());
  }
  async function tick() {
    try { await refresh(); }
    finally { setTimeout(tick, msUntilNextMinute()); }
  }

  tick();

  // ---- always-landscape fit ----
  // The design is fixed at 800×480 with transform-origin top-left. On portrait
  // phones we rotate the body 90° so it reads as landscape; on small screens
  // we scale it down to fit. Translate so the body sticks to the top of the
  // visible viewport and is centered horizontally.
  function fit() {
    const dw = 800, dh = 480;
    const vw = window.innerWidth, vh = window.innerHeight;
    const portrait = vh > vw;
    const availW = portrait ? vh : vw;
    const availH = portrait ? vw : vh;
    const scale = Math.min(availW / dw, availH / dh, 1);
    let transform;
    if (portrait) {
      // After rotating 90° around top-left, the body sits in negative-X,
      // positive-Y space; translate right by its post-rotation width to
      // bring it on-screen, plus extra to horizontally center it.
      const visualW = dh * scale;        // post-rotation width = original height
      const tx = (vw - visualW) / 2 + visualW;
      transform = `translate(${tx}px, 0) rotate(90deg) scale(${scale})`;
    } else {
      const visualW = dw * scale;
      const tx = (vw - visualW) / 2;
      transform = `translate(${tx}px, 0) scale(${scale})`;
    }
    document.body.style.transform = transform;
  }
  window.addEventListener("resize", fit);
  window.addEventListener("orientationchange", fit);
  fit();
</script>
</body>
</html>
